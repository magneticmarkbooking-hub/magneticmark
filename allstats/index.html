<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Stats | MagneticMark</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="all-stats.css">
</head>
<body>

<div class="ambient-glow"></div>

<main class="stats-wrap">

  <header class="stats-header">
    <div class="stats-header-top">
      <span class="eyebrow">ALL STATS</span>
    </div>
    <h1>MagneticMark</h1>
    <p class="subtitle">Pick a release to see its stats</p>
  </header>

  <section id="releaseGrid" class="release-grid">
    <p class="empty-state">Loading releases…</p>
  </section>

  <section class="email-section">
    <div class="email-section-header">
      <h2>Email Signups</h2>
      <button type="button" id="exportCsvBtn" class="export-csv-btn">Export CSV</button>
    </div>
    <p class="email-count" id="emailCount">Loading…</p>
    <div class="email-list" id="emailList"></div>
  </section>

</main>

<script src="SUPABASE_DANE.js"></script>
<script src="all-stats.js"></script>
</body>
</html>
