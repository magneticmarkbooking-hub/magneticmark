<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats: Hey Hi Hello | MagneticMark</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stats.css">
</head>
<body>

<div class="ambient-glow"></div>

<main class="stats-wrap">

  <header class="stats-header">
    <div class="stats-header-top">
      <span class="stats-eyebrow">RELEASE STATS</span>
      <span class="stats-updated" id="lastUpdated">—</span>
    </div>
    <h1 class="stats-title" id="releaseTitle">Hey Hi Hello</h1>
    <p class="stats-sub">MagneticMark</p>
  </header>

  <section class="stats-grid" id="summaryGrid">
    <div class="stat-card">
      <span class="stat-label">Views</span>
      <span class="stat-value" id="totalViews">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Clicks</span>
      <span class="stat-value" id="totalClicks">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">CTR</span>
      <span class="stat-value" id="ctrValue">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Top country</span>
      <span class="stat-value" id="topCountry">—</span>
    </div>
  </section>

  <section class="stats-panels">
    <div class="panel">
      <h2 class="panel-title">Countries</h2>
      <div class="bar-list" id="countryList">
        <p class="empty-state">No data yet</p>
      </div>
    </div>

    <div class="panel">
      <h2 class="panel-title">Platform</h2>
      <div class="bar-list" id="platformList">
        <p class="empty-state">No data yet</p>
      </div>
    </div>

    <div class="panel">
      <h2 class="panel-title">Device</h2>
      <div class="bar-list" id="deviceList">
        <p class="empty-state">No data yet</p>
      </div>
    </div>

    <div class="panel panel-wide">
      <div class="panel-header-row">
        <h2 class="panel-title">Daily activity</h2>
        <div class="daily-legend">
          <span class="legend-item"><span class="legend-dot legend-dot-views"></span>Views</span>
          <span class="legend-item"><span class="legend-dot legend-dot-clicks"></span>Clicks</span>
        </div>
      </div>
      <div class="daily-chart" id="dailyChart">
        <p class="empty-state">No data yet</p>
      </div>
      <div class="daily-nav">
        <button class="daily-nav-btn" id="dailyPrevBtn" aria-label="Earlier period">‹ Earlier</button>
        <span class="daily-range-label" id="dailyRangeLabel"></span>
        <button class="daily-nav-btn" id="dailyNextBtn" aria-label="Later period">Later ›</button>
      </div>
    </div>
  </section>

  <p class="stats-note" id="statsNote"></p>

</main>

<script src="../SUPABASE_DANE.js"></script>
<script>const RELEASE_SLUG = "heyhihello";</script>
<script src="stats.js"></script>
</body>
</html>
